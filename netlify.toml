[build]
  publish = "/public/"
  functions = "netlify/functions"

[[redirects]]
  from = "/u/:handle"
  to = "/profile.html?u=:handle"
  status = 200

[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
